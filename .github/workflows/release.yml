name: Build & release (macOS + Windows)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pos-desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            renderer/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix renderer ci

      - name: Set release version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.1.${{ github.run_number }}"
          fi
          echo "RELEASE_VERSION=$VER" >> "$GITHUB_ENV"
          npm version "$VER" --no-git-tag-version --allow-same-version

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Build renderer and publish installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish -- --${{ matrix.platform }}
